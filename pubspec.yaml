name: afristore
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.1
  smooth_page_indicator: ^1.1.0
  flutter_rating_bar: ^4.0.1
  firebase_core: ^3.1.0
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.1.0
  firebase_storage: ^12.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/products/mens/
    - assets/images/products/womens/
    - assets/images/products/kids/
    - assets/images/products/accessories/
    - assets/images/banners/
    - assets/images/categories/
    - assets/images/general/